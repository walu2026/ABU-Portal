<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A32 – Angebot und Nachfrage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    padding: 20px;
  }

  .top-bar {
    max-width: 960px;
    margin: 0 auto 16px auto;
    background: #1a3c5e;
    color: white;
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .top-bar h1 {
    font-size: 16px;
    font-weight: 600;
    flex: 1;
    min-width: 200px;
  }

  .name-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .name-group label {
    font-size: 13px;
    white-space: nowrap;
    opacity: 0.85;
  }

  .name-group input {
    padding: 6px 10px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
    width: 180px;
  }

  .name-group input::placeholder { color: rgba(255,255,255,0.5); }
  .name-group input:focus { outline: none; border-color: #7eb8e8; background: rgba(255,255,255,0.25); }

  .btn {
    padding: 8px 18px;
    border-radius: 7px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-pdf {
    background: #e8a020;
    color: white;
  }
  .btn-pdf:hover { background: #c98010; transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .btn-reset:hover { background: rgba(255,255,255,0.25); }

  /* Worksheet container */
  .worksheet {
    max-width: 960px;
    margin: 0 auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  .page-wrap {
    position: relative;
    width: 100%;
  }

  .page-wrap img {
    width: 100%;
    display: block;
  }

  /* Input fields overlay */
  .field {
    position: absolute;
    background: rgba(255, 252, 220, 0.92);
    border: 1.5px solid #c8b400;
    border-radius: 4px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    resize: none;
    padding: 2px 6px;
    line-height: 1.4;
    transition: border-color 0.2s, background 0.2s;
  }

  .field:focus {
    outline: none;
    border-color: #1a3c5e;
    background: rgba(240, 248, 255, 0.95);
    box-shadow: 0 0 0 2px rgba(26,60,94,0.15);
    z-index: 10;
  }

  .field::placeholder {
    color: #bbb;
    font-style: italic;
    font-size: 12px;
  }

  /* Print styles */
  @media print {
    body { background: white; padding: 0; }
    .top-bar { display: none; }
    .worksheet { box-shadow: none; border-radius: 0; max-width: 100%; }
    .field {
      background: transparent !important;
      border: none !important;
      border-bottom: 1px solid #999 !important;
      border-radius: 0 !important;
    }
    @page { margin: 1cm; }
  }
</style>
</head>

function printAsPDF() {
  const name = document.getElementById('studentName').value.trim();
  if (!name) {
    alert('Bitte zuerst deinen Namen eingeben!');
    document.getElementById('studentName').focus();
    return;
  }
  document.title = 'A32_Angebot_Nachfrage_' + name.replace(/\s+/g, '_');
  window.print();
}

function resetFields() {
  if (!confirm('Alle Eingaben löschen?')) return;
  document.querySelectorAll('.field').forEach(f => f.value = '');
  document.getElementById('studentName').value = '';
}

// Auto-save to localStorage
const FIELDS = ['a1','a2','a3','a4',
  'b1a','b1p','b2a','b2p','b3a','b3p','b4a','b4p','b5a','b5p',
  'b6a','b6p','b7a','b7p','b8a','b8p','b9a','b9p','studentName'];

function save() {
  const data = {};
  FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) data[id] = el.value;
  });
  localStorage.setItem('a32_data', JSON.stringify(data));
}

function load() {
  try {
    const data = JSON.parse(localStorage.getItem('a32_data') || '{}');
    FIELDS.forEach(id => {
      const el = document.getElementById(id);
      if (el && data[id]) el.value = data[id];
    });
  } catch(e) {}
}

FIELDS.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', save);
});

load();
